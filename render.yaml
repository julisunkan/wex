services:
  # ── Backend API ───────────────────────────────────────────────────────────────
  - type: web
    name: bank-analyzer-api
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: USDT_WALLET_ADDRESS
        sync: false
      - key: USDT_NETWORK
        value: tron
      - key: USDT_PRICE
        value: "5"
      - key: TRONGRID_API_KEY
        sync: false
      - key: BSCSCAN_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # ── Frontend Static Site ──────────────────────────────────────────────────────
  - type: web
    name: bank-analyzer-ui
    runtime: static
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: dist/public
    envVars:
      - key: VITE_API_URL
        # Set this to your backend service URL, e.g.:
        # https://bank-analyzer-api.onrender.com
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
