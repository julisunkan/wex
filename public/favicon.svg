<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#2563eb"/>
        <stop offset="100%" stop-color="#4f46e5"/>
      </linearGradient>
      <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="white" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="180" height="180" rx="39.6" fill="url(#bg)"/>
    <rect width="180" height="90" rx="39.6" fill="url(#shine)"/>

    <!-- Dollar circle indicator -->
    <circle cx="51.6" cy="29.1" r="14.4" fill="white" opacity="0.22"/>
    <text x="51.6" y="34.6" text-anchor="middle" fill="white" font-size="17.3" font-family="Arial,sans-serif" font-weight="bold" opacity="0.9">$</text>

    <!-- Uptrend line -->
    <polyline points="61.2,67.6 90.0,41.9 118.8,54.8" stroke="white" stroke-width="4.0" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
    <!-- Dot at peak -->
    <circle cx="90.0" cy="41.9" r="6.1" fill="white" opacity="0.95"/>

    <!-- Bar chart -->
    <rect x="50.8" y="74.0" width="20.8" height="44.9" rx="6.2" fill="white" opacity="0.7"/>
<rect x="79.6" y="48.3" width="20.8" height="70.5" rx="6.2" fill="white" opacity="0.7999999999999999"/>
<rect x="108.4" y="61.2" width="20.8" height="57.7" rx="6.2" fill="white" opacity="0.8999999999999999"/>

    <!-- Baseline -->
    <rect x="44.3" y="118.8" width="91.3" height="4.0" rx="1.9" fill="white" opacity="0.35"/>
  </svg>